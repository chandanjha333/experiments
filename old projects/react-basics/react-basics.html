        margin-top: 10px;
        margin-right: 5px;
        border-radius: 5px;
      }

  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

      function CounterButton() {
        const [count, setCount] = React.useState(0);

        function Counter() {
          setCount(count + 1);
        }

        return (
          <>
            <button onClick = {Counter}>Clicked {count} {count == 1? "time" : "times"}</button>
          </>
        );
      }
      
      function App() {
        const [showPassword, setShowPassword] = React.useState(false);

        function hidePassword() {
          if(showPassword) {
            setShowPassword(false);
          } else {
            setShowPassword(true);
          }
        }

        return (
          <>
            <p className="welcome-note">Hello, welcome to my Website</p>
            <div>
              <input className="input-container" placeholder="Email"></input>
            </div>
            <div>
              <input 
                type={showPassword ? "text" : "password"}
                className="input-container"
                placeholder="Password"
              ></input>
              <button onClick={hidePassword}>Show</button>
            </div>
            <button className="blue-button">Login</button>
            <button className="blue-button">Sign up</button>
          </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
