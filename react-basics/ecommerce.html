<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
      
      function ProductDetails({productName, productPrice, discountPrice, imageSrc}) {
        return (
          <>
            <img src={imageSrc}/>
            <p>{productName}</p>
            {discountPrice ? <del>Price: ${productPrice}</del> : <p>Price: ${productPrice}</p>}
            {discountPrice && <p>Discount price: ${discountPrice}</p>}
            <button>Add to Cart</button>
          </>
        );
      }

      function App() {
        
        return (
          <>
            <ProductDetails 
              productName="Cotton Socks"
              productPrice="10.90"
              discountPrice="5.45"
              imageSrc="cotton-socks.png"
            />
            <ProductDetails 
              productName="Tennis Balls" 
              productPrice="6.00" 
              imageSrc="tennis-balls.png"
            />
            <ProductDetails 
              productName="Plain T-Shirt" 
              productPrice="7.99"
              imageSrc="plain-t-shirt.png"
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
